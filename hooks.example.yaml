version: "1"

defaults:
  model: your-model-here
  onFailure:
    action: continue
    notifyUser: false

hooks:
  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 1: rm Guard
  # Block any exec tool call whose command matches "rm " (with a space).
  # This prevents accidental file deletion by the agent.
  # Use `trash` instead — see AGENTS.md.
  # ────────────────────────────────────────────────────────────────
  - point: turn:tool:pre
    match:
      tool: exec
      commandPattern: "^rm\\s"
    action: block
    onFailure:
      action: block
      notifyUser: true
      message: |
        🚫 Blocked: rm is not allowed. Use `trash <path>` instead to safely
        move files to trash. This policy is defined in HOOKS.yaml (rm guard).

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 2: Topic Activity Logger
  # Log every turn in a specific forum topic to a daily log file.
  # This is a non-blocking observability hook.
  # ────────────────────────────────────────────────────────────────
  - point:
      - turn:pre
      - turn:post
    match:
      topicId: 42
    action: log
    target: "/path/to/workspace/memory/hooks-log.jsonl"
    onFailure:
      action: continue
      notifyUser: false

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 3: Subagent Spawn Logger
  # Summarize every subagent spawn with an LLM and append to memory.
  # Uses the default model unless overridden here.
  # ────────────────────────────────────────────────────────────────
  - point: subagent:spawn:pre
    action: summarize_and_log
    model: anthropic/claude-haiku-4-5
    target: "/path/to/workspace/memory/subagent-spawns.jsonl"
    onFailure:
      action: continue

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 4: Context Injection on Turn Start
  # Inject a safety reminder file before each turn (disabled by default).
  # ────────────────────────────────────────────────────────────────
  - point: turn:pre
    action: inject_context
    target: "/path/to/workspace/memory/safety-reminder.md"
    enabled: false
    onFailure:
      action: continue

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 5: Block dangerous shell patterns (multi-point)
  # Catch rm -rf and similar destructive patterns at both main and
  # subagent tool levels.
  # ────────────────────────────────────────────────────────────────
  - point:
      - turn:tool:pre
      - subagent:tool:pre
    match:
      tool: exec
      commandPattern: "rm\\s+-[rRfF]"
    action: block
    onFailure:
      action: block
      notifyUser: true
      message: "🚫 Blocked: Recursive/forced rm detected. This operation is not permitted."

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 6: File System Access Monitor (Semantic Action Types)
  # Log all file write operations across any tool that writes files.
  # Uses the "action" filter with semantic categories instead of
  # enumerating individual tool names. The "fs.*" pattern matches
  # tools mapped to fs.read, fs.write, fs.delete, fs.create, etc.
  # ────────────────────────────────────────────────────────────────
  - point: turn:tool:post
    match:
      action: "fs.*"
    action: log
    target: "/path/to/workspace/memory/fs-write-audit.jsonl"
    onFailure:
      action: continue
      notifyUser: false

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 7: HTTP Request Summary (Semantic Action Types)
  # Summarize and log all HTTP requests (web_search, web_fetch, etc.)
  # using an LLM, regardless of which specific tool was used.
  # ────────────────────────────────────────────────────────────────
  - point: turn:tool:post
    match:
      action: "http.*"
    action: summarize_and_log
    model: anthropic/claude-haiku-4-5
    target: "/path/to/workspace/memory/http-requests.jsonl"
    onFailure:
      action: continue

  # ────────────────────────────────────────────────────────────────
  # EXAMPLE 8: Block External Messaging (Semantic Action Types)
  # Prevent the agent from sending messages to external platforms
  # (Telegram, Discord, email, etc.) in certain sensitive contexts.
  # Uses "messaging.*" to cover all messaging tools.
  # ────────────────────────────────────────────────────────────────
  - point: turn:tool:pre
    match:
      action: "messaging.*"
      topicId: 42  # Only in this sensitive topic
    action: block
    onFailure:
      action: block
      notifyUser: true
      message: "🚫 Blocked: External messaging is not permitted in this topic."
